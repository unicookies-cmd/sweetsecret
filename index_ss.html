<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sweet Escape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    /* ── DESIGN TOKENS ───────────────────────────────────────── */
    :root {
      --rose:       #e8a0b0;
      --rose-light: #f7d6e0;
      --rose-pale:  #fdf0f4;
      --gold:       #c9a84c;
      --gold-light: #e8d5a3;
      --sky:        #b8d8f0;
      --lavender:   #d4c8f0;
      --cream:      #fdf8f0;
      --text-dark:  #4a2a35;
      --text-mid:   #7a5060;
      --text-light: #b08090;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Cormorant Garamond', Georgia, serif;
      --font-ui:      'Lato', sans-serif;
    }

    /* ── RESET ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--cream);
      color: var(--text-dark);
      line-height: 1.7;
    }
    img { max-width: 100%; display: block; }

    /* ── SHARED UTILITIES ────────────────────────────────────── */
    .section-inner {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }
    .gold-rule {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1rem 0;
      color: var(--gold);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
    }
    .gold-rule::before,
    .gold-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-light), transparent);
    }
    .heart { color: var(--rose); }

    /* ── HERO SECTION ────────────────────────────────────────── */
    /* Edit: background image, headline, subheadline, button text */
    #hero {
      position: relative;
      min-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 1.5rem 3rem;
      overflow: hidden;

      /* ★ REPLACE with your background image */
      background: linear-gradient(160deg, #f9cfe3 0%, #fde8f0 30%, #d8eefa 70%, #eeddf7 100%);
    }
    #hero .hero-gate-left,
    #hero .hero-gate-right {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 18%;
      /* Decorative side columns — replace with actual gate PNGs if desired */
      background: linear-gradient(to right, rgba(201,168,76,0.12), transparent);
      pointer-events: none;
    }
    #hero .hero-gate-right {
      right: 0;
      background: linear-gradient(to left, rgba(201,168,76,0.12), transparent);
    }
    #hero .hero-eyebrow {
      font-family: var(--font-ui);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: var(--text-mid);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    #hero h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.05;
      margin-bottom: 1.5rem;
    }
    #hero h1 em {
      font-style: italic;
      color: var(--rose);
    }
    #hero .hero-tagline {
      font-family: var(--font-body);
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-style: italic;
      color: var(--text-mid);
      max-width: 360px;
      line-height: 1.8;
      margin-bottom: 0.75rem;
    }
    #hero .hero-sub {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-light);
      max-width: 320px;
      margin-bottom: 2.5rem;
    }
    #hero .hero-cta {
      display: inline-block;
      background: var(--rose);
      color: #fff;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1rem 2.5rem;
      border-radius: 4px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    #hero .hero-cta:hover {
      background: var(--text-dark);
      transform: translateY(-2px);
    }
    #hero .hero-hint {
      margin-top: 1.25rem;
      font-family: var(--font-body);
      font-style: italic;
      font-size: 0.9rem;
      color: var(--text-light);
    }

    /* ── JOURNAL SECTION ─────────────────────────────────────── */
    /* Edit: title, subtitle, prompts array in JS below */
    #journal {
      padding: 5rem 1.5rem;
      background: var(--cream);
    }
    #journal .journal-card {
      border: 1.5px solid var(--gold-light);
      border-radius: 12px;
      padding: 3rem 2.5rem;
      position: relative;
      background: #fff;
      max-width: 700px;
      margin: 0 auto;
    }
    #journal .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: var(--gold);
      border-style: solid;
      border-width: 0;
      opacity: 0.5;
    }
    #journal .corner.tl { top: 10px; left: 10px; border-top-width: 1.5px; border-left-width: 1.5px; border-radius: 3px 0 0 0; }
    #journal .corner.tr { top: 10px; right: 10px; border-top-width: 1.5px; border-right-width: 1.5px; border-radius: 0 3px 0 0; }
    #journal .corner.bl { bottom: 10px; left: 10px; border-bottom-width: 1.5px; border-left-width: 1.5px; border-radius: 0 0 0 3px; }
    #journal .corner.br { bottom: 10px; right: 10px; border-bottom-width: 1.5px; border-right-width: 1.5px; border-radius: 0 0 3px 0; }
    #journal .journal-eyebrow {
      font-family: var(--font-ui);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-light);
      text-align: center;
      margin-bottom: 0.25rem;
    }
    #journal h2 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-style: italic;
      color: var(--text-dark);
      text-align: center;
      margin-bottom: 0.25rem;
    }
    #journal .journal-subtitle {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--rose);
      text-align: center;
      font-style: italic;
      margin-bottom: 2rem;
    }
    .journal-prompt {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--rose-light);
    }
    .journal-prompt:last-child { border-bottom: none; }
    .journal-prompt .bullet { color: var(--rose); flex-shrink: 0; }
    .journal-prompt p {
      font-family: var(--font-body);
      font-size: 1.05rem;
      color: var(--text-dark);
      flex: 1;
    }

    /* ── CARDS SECTION ───────────────────────────────────────── */
    /* Edit: cards data in JS below */
    #cards {
      padding: 4rem 1.5rem;
      background: linear-gradient(180deg, #fdf0f4 0%, #eef4fb 100%);
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 780px;
      margin: 0 auto;
    }
    .escape-card {
      background: #fff;
      border: 1.5px solid var(--gold-light);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .escape-card .card-image {
      height: 180px;
      object-fit: cover;
      width: 100%;
      /* ★ Replace with your actual image via data-bg attribute */
      background: linear-gradient(135deg, var(--rose-light), var(--sky));
    }
    .escape-card .card-body {
      padding: 1.25rem 1.25rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .escape-card .card-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-style: italic;
      color: var(--text-dark);
      margin-bottom: 0.25rem;
    }
    .escape-card .card-emoji {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }
    .escape-card .card-prompt {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text-mid);
      font-style: italic;
    }

    /* ── CLOSING REFLECTION SECTION ─────────────────────────── */
    /* Edit: columns data in JS below */
    #closing {
      padding: 5rem 1.5rem 4rem;
      background: var(--cream);
    }
    #closing h2 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      color: var(--rose);
      text-align: center;
      margin-bottom: 2rem;
    }
    .closing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 2rem;
      max-width: 780px;
      margin: 0 auto 2.5rem;
    }
    .closing-col p {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-mid);
      line-height: 1.75;
    }
    .closing-col .closing-list {
      list-style: none;
      padding: 0;
    }
    .closing-col .closing-list li {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--text-mid);
      padding: 0.25rem 0;
    }
    .closing-col .closing-list li::before {
      content: '♥ ';
      color: var(--rose);
    }
    #closing .closing-tagline {
      text-align: center;
      font-family: var(--font-display);
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      font-style: italic;
      color: var(--text-mid);
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      #journal .journal-card { padding: 2rem 1.25rem; }
      .cards-grid { grid-template-columns: 1fr; }
      .closing-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     SECTION 1 — HERO
     To customize: edit data-* attributes on #hero
     or update the JS config object below.
═════════════════════════════════════════════════ -->
<section id="hero"
  data-eyebrow="Welcome to Your"
  data-headline-plain="Sweet"
  data-headline-italic="Escape"
  data-tagline="Take a breath.\nSlow down.\nThis moment is yours."
  data-sub="The first step in self-awareness is noticing what's already here."
  data-cta-text="Enter Here"
  data-cta-sub="for Guided Meditation"
  data-cta-href="#journal"
  data-hint="Click to enter your Sweet Escape"
>
  <div class="hero-gate-left" aria-hidden="true"></div>
  <div class="hero-gate-right" aria-hidden="true"></div>

  <p class="hero-eyebrow" id="hero-eyebrow"></p>
  <h1 id="hero-h1"></h1>
  <p class="hero-tagline" id="hero-tagline"></p>
  <p class="hero-sub" id="hero-sub"></p>
  <a class="hero-cta" id="hero-cta" href="#journal">
    <span id="hero-cta-text"></span><br>
    <small id="hero-cta-sub" style="font-weight:300;letter-spacing:.05em;font-size:.75em;"></small>
  </a>
  <p class="hero-hint" id="hero-hint"></p>
</section>


<!-- ═══════════════════════════════════════════════
     SECTION 2 — JOURNAL PROMPTS
     To customize: edit the JOURNAL_PROMPTS array in
     the <script> block at the bottom of this file.
═════════════════════════════════════════════════ -->
<section id="journal">
  <div class="journal-card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <p class="journal-eyebrow">Journal Prompt:</p>
    <h2>Awareness</h2>
    <div class="gold-rule"><span class="heart">♥</span></div>
    <p class="journal-subtitle">Take a few moments to reflect.</p>

    <div id="journal-prompts"></div>
  </div>
</section>


<!-- ═══════════════════════════════════════════════
     SECTION 3 — ESCAPE CARDS
     To customize: edit the ESCAPE_CARDS array in
     the <script> block at the bottom of this file.
═════════════════════════════════════════════════ -->
<section id="cards">
  <div class="cards-grid" id="cards-grid"></div>
</section>


<!-- ═══════════════════════════════════════════════
     SECTION 4 — CLOSING REFLECTION
     To customize: edit the CLOSING config object in
     the <script> block at the bottom of this file.
═════════════════════════════════════════════════ -->
<section id="closing">
  <div class="section-inner">
    <h2 id="closing-title"></h2>
    <div class="closing-grid" id="closing-grid"></div>
    <p class="closing-tagline" id="closing-tagline"></p>
  </div>
</section>


<!-- ═══════════════════════════════════════════════
     ✏️  CONTENT CONFIGURATION
     Edit everything here — no need to touch HTML above.
═════════════════════════════════════════════════ -->
<script>

/* ── SECTION 2: JOURNAL PROMPTS ────────────────────────────── */
const JOURNAL_PROMPTS = [
  "What am I feeling most strongly today?",
  "What has been repeatedly asking for my attention?",
  "Where am I rushing through life instead of experiencing it?",
  "What would change if I gave myself permission to pause?",
  "What am I becoming aware of in this season of my life?",
];

/* ── SECTION 3: ESCAPE CARDS ───────────────────────────────── */
const ESCAPE_CARDS = [
  {
    title: "Paradise",
    emoji: "🌴",
    prompt: "Where can I choose joy today?",
    // Replace with a real image URL, e.g. "images/paradise.jpg"
    bgColor: "linear-gradient(135deg, #fde8b0, #f9c5a0, #b8e8d8)",
  },
  {
    title: "Starry",
    emoji: "⭐",
    prompt: "What dream am I ready to give attention to?",
    bgColor: "linear-gradient(135deg, #c8c0f0, #9090d8, #d0b8f0)",
  },
  {
    title: "Turtle",
    emoji: "🐢",
    prompt: "Where do I need to slow down and breathe?",
    bgColor: "linear-gradient(135deg, #b8e8d8, #90c8b0, #c8e8f0)",
  },
];

/* ── SECTION 4: CLOSING REFLECTION ────────────────────────────── */
const CLOSING = {
  title: "Closing Reflection",
  tagline: "Today, simply observe. Breathe. And trust what is being revealed to you.",
  columns: [
    {
      type: "text",
      content: "Awareness isn't about fixing yourself.\nIt's about noticing.",
    },
    {
      type: "list",
      items: [
        "Noticing your thoughts.",
        "Noticing your feelings.",
        "Noticing your patterns.",
      ],
    },
    {
      type: "text",
      content: "Because what you become aware of, you can begin to intentionally shape.",
    },
  ],
};


/* ═══════════════════════════════════════════════
   RENDER ENGINE — no editing needed below here
   unless you want to change layout logic.
═══════════════════════════════════════════════ */

// Hero
(function renderHero() {
  const s = document.getElementById('hero');
  const get = k => s.dataset[k] || '';
  document.getElementById('hero-eyebrow').textContent = get('eyebrow');
  document.getElementById('hero-h1').innerHTML =
    get('headlinePlain') + ' <em>' + get('headlineItalic') + '</em>';
  document.getElementById('hero-tagline').innerHTML =
    get('tagline').replace(/\n/g, '<br>');
  document.getElementById('hero-sub').textContent = get('sub');
  document.getElementById('hero-cta').href = get('ctaHref') || '#';
  document.getElementById('hero-cta-text').textContent = get('ctaText');
  document.getElementById('hero-cta-sub').textContent = get('ctaSub');
  document.getElementById('hero-hint').textContent = get('hint');
})();

// Journal prompts
(function renderJournal() {
  const container = document.getElementById('journal-prompts');
  JOURNAL_PROMPTS.forEach(prompt => {
    const div = document.createElement('div');
    div.className = 'journal-prompt';
    div.innerHTML = `<span class="bullet">♥</span><p>${prompt}</p>`;
    container.appendChild(div);
  });
})();

// Escape cards
(function renderCards() {
  const grid = document.getElementById('cards-grid');
  ESCAPE_CARDS.forEach(card => {
    const el = document.createElement('div');
    el.className = 'escape-card';
    el.innerHTML = `
      <div class="card-image" style="background:${card.bgColor};"></div>
      <div class="card-body">
        <p class="card-emoji">${card.emoji}</p>
        <h3 class="card-title">${card.title}</h3>
        <p class="card-prompt">${card.prompt}</p>
      </div>
    `;
    grid.appendChild(el);
  });
})();

// Closing reflection
(function renderClosing() {
  document.getElementById('closing-title').textContent = CLOSING.title;
  document.getElementById('closing-tagline').textContent = CLOSING.tagline;

  const grid = document.getElementById('closing-grid');
  CLOSING.columns.forEach(col => {
    const div = document.createElement('div');
    div.className = 'closing-col';
    if (col.type === 'list') {
      const ul = document.createElement('ul');
      ul.className = 'closing-list';
      col.items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
      });
      div.appendChild(ul);
    } else {
      const p = document.createElement('p');
      p.innerHTML = col.content.replace(/\n/g, '<br>');
      div.appendChild(p);
    }
    grid.appendChild(div);
  });
})();

</script>
</body>
</html>
